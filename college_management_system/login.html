<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧校园信息管理系统 - 登录</title>
    <link rel="stylesheet" href="lib/font-awesome.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 登录页专属导航栏 -->
    <header class="nav-header auth-nav">
        <div class="logo">智慧校园<span>管理系统</span></div>
    </header>

    <!-- 登录表单区域 -->
    <div class="auth-container">
        <div class="auth-card">
            <h2>系统登录</h2>
            <form>
                <div class="form-group">
                    <label for="username">账号</label>
                    <input type="text" id="username" class="form-input" placeholder="用户名/学号/工号" required>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" class="form-input" placeholder="请输入登录密码" required>
                </div>
                <div class="form-group" style="display: flex; justify-content: space-between; align-items: center; font-size: 13px;">
                    <label style="display: flex; align-items: center; gap: 6px;">
                        <input type="checkbox"> 记住密码
                    </label>
                    <a href="#" style="color: #3498db; text-decoration: none;">忘记密码？</a>
                </div>
                <button type="submit" class="btn btn-login">
                    <i class="fa fa-sign-in"></i> 登录系统
                </button>
            </form>
            <div class="auth-link">
                还没有账号？<a href="register.html">立即注册</a>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <p>© 2025 智慧校园信息管理系统 版权所有</p>
    </footer>
</body>
</html>
