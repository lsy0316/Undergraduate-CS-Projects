<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧校园信息管理系统 - 注册</title>
    <link rel="stylesheet" href="lib/font-awesome.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 注册页专属导航栏 -->
    <header class="nav-header auth-nav">
        <div class="logo">智慧校园<span>管理系统</span></div>
    </header>

    <!-- 注册表单区域 -->
    <div class="auth-container">
        <div class="auth-card">
            <h2>账号注册</h2>
            <form>
                <div class="form-group">
                    <label for="reg-username">用户名</label>
                    <input type="text" id="reg-username" class="form-input" placeholder="4-20位字母/数字" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">密码</label>
                    <input type="password" id="reg-password" class="form-input" placeholder="8位以上字母+数字" required>
                </div>
                <div class="form-group">
                    <label for="reg-repassword">确认密码</label>
                    <input type="password" id="reg-repassword" class="form-input" placeholder="再次输入密码" required>
                </div>
                <div class="form-group">
                    <label for="reg-phone">手机号</label>
                    <div class="form-row">
                        <input type="text" id="reg-phone" class="form-input" placeholder="请输入手机号" required>
                        <button type="button" class="btn btn-edit">获取验证码</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="reg-code">验证码</label>
                    <input type="text" id="reg-code" class="form-input" placeholder="6位验证码" required>
                </div>
                <div class="form-group" style="font-size: 13px;">
                    <label style="display: flex; align-items: center; gap: 6px;">
                        <input type="checkbox" required> 我已阅读并同意《用户协议》
                    </label>
                </div>
                <button type="submit" class="btn btn-register">
                    <i class="fa fa-user-plus"></i> 完成注册
                </button>
            </form>
            <div class="auth-link">
                已有账号？<a href="login.html">立即登录</a>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <p>© 2025 智慧校园信息管理系统 版权所有</p>
    </footer>
</body>
</html>
